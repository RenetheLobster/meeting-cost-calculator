name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Trigger Streamlit Cloud Deploy
      run: |
        echo "Pushed to main - Streamlit Cloud will auto-deploy"
        echo "Check status at: https://share.streamlit.io/"
